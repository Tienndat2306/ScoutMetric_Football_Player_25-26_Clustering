<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScoutMetric Pro{% endblock %} - Player Clustering Analysis</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.0/dist/chartjs-plugin-annotation.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-container": "#646274",
                        "on-primary-fixed-variant": "#5a00c6",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed-dim": "#c7c5d1",
                        "surface-variant": "#dce2f3",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2a313d",
                        "primary": "#630ed4",
                        "error-container": "#ffdad6",
                        "primary-container": "#7c3aed",
                        "surface-container-highest": "#dce2f3",
                        "primary-fixed-dim": "#d2bbff",
                        "outline-variant": "#ccc3d8",
                        "secondary-fixed": "#e4e0f5",
                        "on-tertiary-container": "#e7e5f1",
                        "on-secondary-fixed-variant": "#464555",
                        "tertiary-fixed": "#e3e1ed",
                        "on-secondary-fixed": "#1b1a29",
                        "tertiary-container": "#666670",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-container": "#e4e0f5",
                        "surface-tint": "#732ee4",
                        "on-primary-container": "#ede0ff",
                        "surface-container": "#e7eefe",
                        "secondary-fixed-dim": "#c7c4d8",
                        "surface-dim": "#d3daea",
                        "on-tertiary": "#ffffff",
                        "surface": "#f9f9ff",
                        "on-tertiary-fixed-variant": "#46464f",
                        "background": "#f9f9ff",
                        "on-tertiary-fixed": "#1a1b23",
                        "on-background": "#151c27",
                        "surface-container-low": "#f0f3ff",
                        "on-surface-variant": "#4a4455",
                        "on-primary-fixed": "#25005a",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#d2bbff",
                        "surface-container-high": "#e2e8f8",
                        "primary-fixed": "#eaddff",
                        "outline": "#7b7487",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#ebf1ff",
                        "tertiary": "#4e4e58",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#151c27",
                        "secondary": "#5e5c6e"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        md: "16px",
                        xs: "4px",
                        base: "4px",
                        sm: "8px",
                        margin: "32px",
                        lg: "24px",
                        xl: "40px",
                        gutter: "20px"
                    },
                    fontFamily: {
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "title-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    fontSize: {
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "title-sm": ["18px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f9f9ff; }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-background text-on-background min-h-[1024px]">
    {% block content %}{% endblock %}
    
    <script src="{{ url_for('static', filename='js/chart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
